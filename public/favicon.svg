<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#0a0a0a"/>

  <!-- Left pins — 4 leads (DIP IC style) -->
  <line x1="2"  y1="15" x2="14" y2="15" stroke="#29a35c" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <line x1="2"  y1="25" x2="14" y2="25" stroke="#29a35c" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <line x1="2"  y1="39" x2="14" y2="39" stroke="#29a35c" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <line x1="2"  y1="49" x2="14" y2="49" stroke="#29a35c" stroke-width="2" stroke-linecap="round" opacity="0.75"/>

  <!-- Right pins — 4 leads -->
  <line x1="50" y1="15" x2="62" y2="15" stroke="#29a35c" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <line x1="50" y1="25" x2="62" y2="25" stroke="#29a35c" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <line x1="50" y1="39" x2="62" y2="39" stroke="#29a35c" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <line x1="50" y1="49" x2="62" y2="49" stroke="#29a35c" stroke-width="2" stroke-linecap="round" opacity="0.75"/>

  <!-- Chip body -->
  <rect x="14" y="6" width="36" height="52" rx="3" fill="#29a35c" fill-opacity="0.1" stroke="#29a35c" stroke-width="1.5" opacity="0.85"/>

  <!-- Index notch at top (pin 1 indicator) -->
  <path d="M27 6 A5 5 0 0 1 37 6" stroke="#29a35c" stroke-width="1.5" fill="none" opacity="0.75"/>

  <!-- Pin 1 dot -->
  <circle cx="17" cy="15" r="1.5" fill="#29a35c" opacity="0.6"/>

  <!-- AR label centered in body -->
  <text
    x="32" y="36"
    font-family="'Courier New', Courier, monospace"
    font-weight="800"
    font-size="14"
    fill="#29a35c"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="1"
  >AR</text>
</svg>
